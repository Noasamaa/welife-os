name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            go_binary: welife-engine
          - platform: macos-latest
            go_binary: welife-engine
          - platform: windows-latest
            go_binary: welife-engine.exe

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      # ── Go sidecar ──

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: engine/go.sum

      - name: Install system deps (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsqlcipher-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install system deps (macOS)
        if: matrix.platform == 'macos-latest'
        run: brew install sqlcipher pkg-config

      - name: Build Go engine
        shell: bash
        working-directory: engine
        env:
          CGO_ENABLED: "1"
        run: |
          mkdir -p ../tauri-app/src-tauri/bin

          if [[ "${{ matrix.platform }}" == "macos-latest" ]]; then
            export CGO_CFLAGS="-I$(brew --prefix sqlcipher)/include"
            export CGO_LDFLAGS="-L$(brew --prefix sqlcipher)/lib"
          fi

          go build -trimpath -ldflags="-s -w" \
            -o "../tauri-app/src-tauri/bin/${{ matrix.go_binary }}" \
            ./cmd/welife

      # ── Frontend ──

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install frontend deps
        working-directory: tauri-app
        run: npm ci

      # ── Tauri build & release ──

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "tauri-app/src-tauri -> target"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: tauri-app
          tagName: ${{ github.ref_name }}
          releaseName: "WeLife OS ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install."
          releaseDraft: true
          prerelease: false
